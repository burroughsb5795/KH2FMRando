#rules for what can/cannot be shuffled in order to prevent softlocking

trsr:
  exclude_null: true
  # Valor, Master, and Final Form are all dual-wield (need 2 keyblades).
  # Kingdom Key is Sora's innate weapon, not a chest item, so Oathkeeper/
  # Oblivion are his only path to a 2nd keyblade. All 3 of those forms are
  # now ordinary pool items (see FINAL_FORM_HOST_INDEX in build_pools.py),
  # so any of them could land on literally the first chest a player opens --
  # forcing Oathkeeper/Oblivion into indices 235/236 (chest ids 447/448,
  # "Old Mansion Potion"/"Old Mansion Mythril Shard", the first two chests
  # reachable after regaining control from Roxas) guarantees a 2nd keyblade
  # before *any* other chest can possibly be opened, not just before Master
  # Form's old story checkpoint. Equipping/using a dual-wield form with <2
  # keyblades crashes (a known OpenKH/KH2 issue, confirmed via KH2Randomizer's
  # troubleshooting docs and directly reproduced against a real seed).
  forced:
    - {index: 235, item: 42, reason: "Oathkeeper - guarantees 2nd keyblade from the very first chest"}
    - {index: 236, item: 43, reason: "Oblivion - guarantees 2nd keyblade from the very first chest"}
    - {index: }
  locked:
    - {index: 375, reason: "Presents - story key"}
    - {index: 376, reason: "Decoy Presents - story key"}
    - {index: 368, reason: "Cursed Medallion - story key"}
    - {index: 370, reason: "Auron's Statue - story key"}
    - {index: 322, reason: "Namine's Sketches- story key"}
    - {index: 363, reason: "Ice Cream- story key"}
    - {index: 364, reason: "Picture- story key"}
    - {index: 329, reason: "Membership - story key"}
    - {index: 357, reason: "Seipher's Trophy- story key"}
    - {index: 320, reason: "Struggle Trophy - story key"}
    - {index: 325, reason: "Crystal Orb - story key"}
    - {index: 340, reason: "Olympus Stone- story key"}
    - {index: 33, reason: "Magnet - Need at least 2 for Atlantica"}
    
