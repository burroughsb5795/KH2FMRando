fmlv:
  exclude_null: true

bons:
  exclude_null: true
  # Roxas's 4 event-bonus rewards in Simulated Twilight Town are his only
  # bons entries and always land early in every playthrough (mandatory
  # story), so forcing them guarantees these abilities every run without
  # touching event scripts. id 33/54/73 already give these vanilla; id 34
  # (TwilightThorn's follow-up) is empty in vanilla, used here as the 4th slot.
  forced:
    - {id: 33, character: "Roxas", part: "item1", item: 82, reason: "guaranteed starting ability (Guard)"}
    - {id: 34, character: "Roxas", part: "item1", item: 402, reason: "guaranteed starting ability"}
    - {id: 54, character: "Roxas", part: "item1", item: 158, reason: "guaranteed starting ability (Aerial Recovery)"}
    - {id: 73, character: "Roxas", part: "item1", item: 138, reason: "guaranteed starting ability (Scan)"}